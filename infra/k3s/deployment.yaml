apiVersion: apps/v1
kind: Deployment
metadata:
  name: chess-explainer
  namespace: chess-explainer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chess-explainer
  template:
    metadata:
      labels:
        app: chess-explainer
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: web
          image: chess-explainer:k3s
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: chess-explainer-config
          env:
            - name: OPENAI_API_KEY
              value: ""
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
